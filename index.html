<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G Spur Sammlung - GitHub Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; transition: all 0.3s ease; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .train-row:hover { background-color: #f8fafc; }
        .thumb-container {
            width: 80px; height: 55px; border-radius: 8px;
            overflow: hidden; cursor: zoom-in; border: 1px solid #e2e8f0; background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        #lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; justify-content: center; align-items: center; cursor: zoom-out;
        }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s; cursor: pointer; position: relative; min-height: 150px; }
        .drop-zone.active { border-color: #3b82f6; background-color: #eff6ff; }
        
        .loading-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 0.75rem; z-index: 10;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .admin-only { display: table-cell; }
        body.buyer-mode .admin-only { display: none !important; }
        
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 0.75rem 1.5rem; border-radius: 99px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: transform 0.3s ease-out; z-index: 200;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="toast">Meldung</div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">G Spur Inventar</h1>
                <p class="text-slate-500">GitHub & LocalStorage Edition</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openAddModal()" class="admin-only bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">+ Hinzufügen</button>
                <button onclick="document.getElementById('batch-input').click()" class="admin-only bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">Batch Upload</button>
                <input type="file" id="batch-input" class="hidden" multiple accept="image/*" onchange="handleFiles(this.files)">
                <button onclick="clearStorage()" class="admin-only bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-200">Daten Löschen</button>
                <button onclick="exportToCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700">Export</button>
            </div>
        </header>

        <div id="batch-status" class="hidden mb-6 bg-white p-4 rounded-xl shadow-sm border border-indigo-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="spinner !mb-0 !w-5 !h-5 !border-2"></div>
                <div>
                    <p class="text-sm font-bold text-indigo-900">KI-Analyse läuft...</p>
                    <p id="batch-progress-text" class="text-xs text-indigo-500">0 von 0 verarbeitet</p>
                </div>
            </div>
            <div class="w-48 h-2 bg-indigo-50 rounded-full overflow-hidden">
                <div id="batch-progress-bar" class="h-full bg-indigo-600 transition-all" style="width: 0%"></div>
            </div>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Modell</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Typ</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase">ID</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Vorschau</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase text-right">Preis</th>
                        <th class="p-4 text-xs font-semibold text-slate-500 uppercase text-center admin-only">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="inventory-body"></tbody>
            </table>
            <div id="empty-state" class="p-12 text-center text-slate-400">Keine Daten vorhanden.</div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src="" class="max-w-[90%] max-h-[90%] rounded-lg border-4 border-white"></div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xl shadow-2xl overflow-y-auto max-h-[95vh] relative">
            <div id="ai-loader" class="loading-overlay"><div class="spinner"></div><p class="text-blue-600 font-bold">KI erkennt Modell...</p></div>

            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-bold text-slate-800">Modell Details</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            
            <div id="drop-zone" class="drop-zone mb-6 p-4 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm bg-slate-50">
                <div id="drop-zone-content" class="text-center">
                    <p class="font-medium">Foto für KI hierher ziehen</p>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="hidden" id="edit-index" value="-1">
                <div class="col-span-2">
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Name</label>
                    <input id="m_name" type="text" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Hersteller</label>
                    <input id="m_brand" type="text" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Artikel-Nr.</label>
                    <input id="m_id" type="text" class="w-full p-2 border rounded-lg">
                </div>
                <div class="col-span-2">
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Bild-Pfad (für GitHub images/lok.jpg)</label>
                    <input id="m_img_path" type="text" placeholder="images/mein-bild.jpg" class="w-full p-2 border rounded-lg text-blue-600">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Kategorie</label>
                    <select id="m_type" class="w-full p-2 border rounded-lg">
                        <option value="Dampflok">Dampflok</option>
                        <option value="Personenwagen">Personenwagen</option>
                        <option value="Güterwagen">Güterwagen</option>
                        <option value="Sonstiges">Sonstiges</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Preis (€)</label>
                    <input id="m_value" type="number" step="0.01" class="w-full p-2 border rounded-lg">
                </div>
            </div>
            
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-500">Abbrechen</button>
                <button onclick="saveItem()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let inventory = JSON.parse(localStorage.getItem('lgb_inventory')) || [];
        let currentImgBase64 = "";

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files, true);

        async function handleFiles(files, fromModal = false) {
            if (!files.length) return;
            if (fromModal) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    currentImgBase64 = e.target.result;
                    document.getElementById('drop-zone-content').innerHTML = `<img src="${currentImgBase64}" class="max-h-24 mx-auto">`;
                    const data = await analyzeImageWithGemini(currentImgBase64.split(',')[1]);
                    if (data) fillModal(data);
                };
                reader.readAsDataURL(files[0]);
            } else {
                // Batch Modus
                document.getElementById('batch-status').classList.remove('hidden');
                for (let i = 0; i < files.length; i++) {
                    document.getElementById('batch-progress-text').innerText = `Analysiere ${i+1}/${files.length}`;
                    const base64 = await fileToBase64(files[i]);
                    const data = await analyzeImageWithGemini(base64.split(',')[1]);
                    if (data) {
                        inventory.push({
                            manufacturer: data.brand || "LGB",
                            manufacturerId: data.id || "---",
                            name: data.name || files[i].name,
                            type: data.type || "Sonstiges",
                            value: 0,
                            img: base64, // Fallback Base64
                            imgPath: ""   // Leer für manuellen Pfad
                        });
                        saveToLocal();
                    }
                }
                document.getElementById('batch-status').classList.add('hidden');
                renderInventory();
            }
        }

        async function analyzeImageWithGemini(base64Image) {
            if (!apiKey) return { brand: "LGB", id: "Auto", name: "Modell erkannt", type: "Dampflok" };
            document.getElementById('ai-loader').style.display = 'flex';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: "JSON: brand, id, name, type (Dampflok, Personenwagen, Güterwagen)" }, { inlineData: { mimeType: "image/png", data: base64Image } }] }],
                generationConfig: { responseMimeType: "application/json" }
            };
            try {
                const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const json = await resp.json();
                document.getElementById('ai-loader').style.display = 'none';
                return JSON.parse(json.candidates[0].content.parts[0].text);
            } catch (e) { 
                document.getElementById('ai-loader').style.display = 'none';
                return null; 
            }
        }

        function fillModal(data) {
            document.getElementById('m_brand').value = data.brand || "";
            document.getElementById('m_id').value = data.id || "";
            document.getElementById('m_name').value = data.name || "";
            document.getElementById('m_type').value = data.type || "Sonstiges";
        }

        function renderInventory() {
            const body = document.getElementById('inventory-body');
            body.innerHTML = '';
            inventory.forEach((item, index) => {
                // Priorität: Manueller Pfad (GitHub images/) > Base64
                const imgSrc = item.imgPath ? item.imgPath : item.img;
                const tr = document.createElement('tr');
                tr.className = "train-row border-b";
                tr.innerHTML = `
                    <td class="p-4"><b>${item.manufacturer}</b><br><small>${item.name}</small></td>
                    <td class="p-4">${item.type}</td>
                    <td class="p-4 font-mono">${item.manufacturerId}</td>
                    <td class="p-4">
                        <div class="thumb-container" onclick="openLightbox('${imgSrc}')">
                            <img src="${imgSrc || 'https://placehold.co/80x55?text=?'}" onerror="this.src='https://placehold.co/80x55?text=Error'">
                        </div>
                    </td>
                    <td class="p-4 text-right">${item.value.toFixed(2)} €</td>
                    <td class="p-4 text-center admin-only">
                        <button onclick="editItem(${index})" class="text-blue-500 px-2">Edit</button>
                        <button onclick="removeItem(${index})" class="text-red-500 px-2">X</button>
                    </td>
                `;
                body.appendChild(tr);
            });
            document.getElementById('empty-state').classList.toggle('hidden', inventory.length > 0);
        }

        function saveItem() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const item = {
                manufacturer: document.getElementById('m_brand').value,
                manufacturerId: document.getElementById('m_id').value,
                name: document.getElementById('m_name').value,
                type: document.getElementById('m_type').value,
                value: parseFloat(document.getElementById('m_value').value) || 0,
                img: currentImgBase64,
                imgPath: document.getElementById('m_img_path').value // Der Pfad zum images/ ordner
            };
            if(idx >= 0) inventory[idx] = item;
            else inventory.push(item);
            saveToLocal();
            renderInventory();
            closeModal();
        }

        function saveToLocal() { localStorage.setItem('lgb_inventory', JSON.stringify(inventory)); }
        function clearStorage() { if(confirm("Alles löschen?")) { localStorage.removeItem('lgb_inventory'); inventory = []; renderInventory(); } }
        function fileToBase64(file) { return new Promise((r, j) => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => r(rd.result); }); }
        function openAddModal() { document.getElementById('edit-index').value = "-1"; resetModal(); document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function resetModal() { currentImgBase64 = ""; document.getElementById('m_img_path').value = ""; document.getElementById('drop-zone-content').innerHTML = "KI Upload"; }
        function editItem(index) {
            const it = inventory[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('m_brand').value = it.manufacturer;
            document.getElementById('m_id').value = it.manufacturerId;
            document.getElementById('m_name').value = it.name;
            document.getElementById('m_type').value = it.type;
            document.getElementById('m_value').value = it.value;
            document.getElementById('m_img_path').value = it.imgPath || "";
            currentImgBase64 = it.img;
            document.getElementById('modal').classList.remove('hidden');
        }
        function removeItem(i) { inventory.splice(i, 1); saveToLocal(); renderInventory(); }
        function openLightbox(s) { document.getElementById('lightbox-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function exportToCSV() { 
            let c = "Brand;ID;Name;Price;ImagePath\n"; 
            inventory.forEach(i => c += `${i.manufacturer};${i.manufacturerId};${i.name};${i.value};${i.imgPath}\n`);
            const b = new Blob([c], {type:'text/csv'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='inventar.csv'; a.click();
        }
        window.onload = renderInventory;
    </script>
</body>
</html>
